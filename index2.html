<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite image carousel animation using css</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="container">
        <div class="wrapper">
            <img src="image1.jpg" alt="image">
            <img src="image2.jpg" alt="image">
            <img src="image3.jpg" alt="image">
            <img src="image4.jpg" alt="image">
            <img src="image5.jpg" alt="image">

            <img src="image1.jpg" aria-hidden="true">
            <img src="image2.jpg" aria-hidden="true">
            <img src="image3.jpg" aria-hidden="true">
            <img src="image4.jpg" aria-hidden="true">
            <img src="image5.jpg" aria-hidden="true">
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
